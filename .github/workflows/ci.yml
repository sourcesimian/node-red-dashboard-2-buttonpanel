name: CI

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#      - dev
#  pull_request:
#    branches:
#      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm pack --dry-run
