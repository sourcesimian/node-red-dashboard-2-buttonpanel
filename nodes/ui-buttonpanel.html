<script type="text/javascript">
  const BUTTONPANEL_NODE_COLOR = '#a8c97f'

  const BUTTONPANEL_WIDGETS = [
    { type: 'text', nodeType: 'ui-buttonpanel-text', label: 'text', color: BUTTONPANEL_NODE_COLOR, icon: 'font-awesome/fa-font' },
    { type: 'button', nodeType: 'ui-buttonpanel-button', label: 'button', color: BUTTONPANEL_NODE_COLOR, icon: 'font-awesome/fa-hand-pointer-o' },
    { type: 'switch', nodeType: 'ui-buttonpanel-switch', label: 'switch', color: BUTTONPANEL_NODE_COLOR, icon: 'font-awesome/fa-toggle-on' },
    { type: 'select', nodeType: 'ui-buttonpanel-select', label: 'select', color: BUTTONPANEL_NODE_COLOR, icon: 'font-awesome/fa-list-ul' },
    { type: 'fader', nodeType: 'ui-buttonpanel-fader', label: 'fader', color: BUTTONPANEL_NODE_COLOR, icon: 'font-awesome/fa-arrows-v' },
    { type: 'image', nodeType: 'ui-buttonpanel-image', label: 'image', color: BUTTONPANEL_NODE_COLOR, icon: 'font-awesome/fa-picture-o' },
    { type: 'iframe', nodeType: 'ui-buttonpanel-iframe', label: 'iframe', color: BUTTONPANEL_NODE_COLOR, icon: 'font-awesome/fa-window-maximize' }
  ]

  const BUTTONPANEL_READ_ONLY_TYPES = ['text', 'switch', 'fader', 'image', 'select']
  const BUTTONPANEL_METER_TYPES = ['fader']
  const BUTTONPANEL_ACTION_TYPES = ['text', 'button', 'switch', 'fader', 'select', 'image']
  const BUTTONPANEL_DISPLAY_ONLY_TYPES = ['iframe']

  function readOnlyDefaultFor (widgetType) {
    return widgetType === 'text' || widgetType === 'image'
  }

  function waitForInputDefaultFor (widgetType) {
    return widgetType !== 'button'
  }

  function outputsFor (widgetType, readOnly) {
    if (BUTTONPANEL_READ_ONLY_TYPES.includes(widgetType)) {
      return readOnly ? 0 : 1
    }
    return BUTTONPANEL_ACTION_TYPES.includes(widgetType) ? 1 : 0
  }

  function buttonpanelDefaults (widgetType) {
    const readOnlyDefault = readOnlyDefaultFor(widgetType)
    const defaults = {
      name: { value: '' },
      group: { type: 'ui-group', required: true },
      order: { value: 0 },
      width: { value: 0 },
      height: { value: 0 },
      config: { value: '' },
      widgetType: { value: widgetType, required: true },
      waitForInput: { value: waitForInputDefaultFor(widgetType) },
      inputs: { value: 1 },
      outputs: { value: outputsFor(widgetType, readOnlyDefault) }
    }

    if (BUTTONPANEL_READ_ONLY_TYPES.includes(widgetType)) {
      defaults.readOnly = { value: readOnlyDefault }
    }
    if (BUTTONPANEL_METER_TYPES.includes(widgetType)) {
      defaults.showMeter = { value: true }
    }

    return defaults
  }

  function prepareButtonPanelEditor (fixedType, nodeConfig) {
    $('.buttonpanel-editor').html($('#buttonpanel-editor-template').html())
    $('#node-input-widgetType').val(fixedType)

    const helpBase = 'https://github.com/sourcesimian/node-red-dashboard-2-buttonpanel/blob/main/MANUAL.md#'

    function updateByType () {
      const type = $('#node-input-widgetType').val() || fixedType
      const readOnly = $('#node-input-readOnly').prop('checked')
      const outputs = outputsFor(type, readOnly)

      $('#node-input-inputs').val(1)
      $('#node-input-outputs').val(outputs)
      $('#buttonpanel-wait-row').toggle(outputs > 0)
      $('#buttonpanel-readOnly-row').toggle(BUTTONPANEL_READ_ONLY_TYPES.includes(type))
      $('#buttonpanel-show-meter-row').toggle(BUTTONPANEL_METER_TYPES.includes(type))
      $('#buttonpanel-config-help').attr('href', `${helpBase}buttonpanel-${type}-config`)

      const hint = BUTTONPANEL_DISPLAY_ONLY_TYPES.includes(type)
        ? 'Display-only widget: incoming values update the tile; no output is emitted.'
        : type === 'button'
          ? 'Button widget: incoming messages can enable or disable it; user taps emit output messages.'
          : BUTTONPANEL_READ_ONLY_TYPES.includes(type)
            ? (readOnly
              ? 'Read-only widget: incoming values update the display; no output is emitted.'
              : 'Interactive widget: incoming values update the display; user actions emit output messages.')
            : 'Interactive widget: incoming values update state; user actions emit output messages.'
      $('#buttonpanel-output-hint').text(hint)
    }

    function stringifyScalar (value) {
      if (value === undefined || value === null) return ''
      if (Array.isArray(value)) return `[${value.map(stringifyScalar).join(', ')}]`
      if (typeof value === 'boolean' || typeof value === 'number') return String(value)
      const text = String(value)
      if (!text) return ''
      if (/[:#\[\]\{\},]|^\s|\s$/.test(text)) return JSON.stringify(text)
      return text
    }

    function stringifyItems (key, items) {
      const rows = [`${key}:`]
      for (const item of items) {
        const entries = Object.entries(item)
        if (!entries.length) continue
        const [firstKey, firstValue] = entries[0]
        rows.push(`  - ${firstKey}: ${stringifyScalar(firstValue)}`)
        entries.slice(1).forEach(([itemKey, itemValue]) => {
          rows.push(`    ${itemKey}: ${stringifyScalar(itemValue)}`)
        })
      }
      return rows
    }

    function stringifyObject (key, value) {
      const rows = [`${key}:`]
      Object.entries(value || {}).forEach(([objectKey, objectValue]) => {
        rows.push(`  ${objectKey}: ${stringifyScalar(objectValue)}`)
      })
      return rows
    }

    function validateConfig (value) {
      if (!value) {
        return true
      }
      const lines = String(value).split(/\r?\n/)
      let section = null
      for (const rawLine of lines) {
        const line = rawLine.trim()
        if (!line || line.startsWith('#')) {
          continue
        }
        const indent = rawLine.match(/^\s*/)[0].length
        if (indent === 0 && line.endsWith(':')) {
          section = line.slice(0, -1).trim()
          continue
        }
        if (indent > 0 && section) {
          continue
        }
        if (line.includes(':')) {
          continue
        }
        return false
      }
      return true
    }

    function sampleConfig (type) {
      const readOnly = $('#node-input-readOnly').prop('checked')
      const samples = {
        text: readOnly
          ? { text: 'Status', icon: 'article', color: '#ffffff' }
          : { text: '', icon: 'keyboard', color: '#f6f26b', confirm: 'Set text?', input_timeout: 0 },
        button: { text: 'Play', value: 'PLAY', icon: 'play_arrow', color: '#52D017', confirm: 'Run command?', confirm_pin: 0, input_timeout: 0 },
        switch: readOnly
          ? {
              values: [
                { value: 'OFF', text: 'Off', icon: 'toggle_off', color: '#7f8790' },
                { value: 'ON', text: 'On', icon: 'toggle_on', color: '#52D017' }
              ]
            }
          : {
              input_timeout: 0,
              values: [
                { value: 'OFF', text: 'Off', icon: 'toggle_off', color: '#7f8790' },
                { value: 'ON', text: 'On', icon: 'toggle_on', color: '#52D017', confirm: 'Turn this on?', confirm_pin: 4 }
              ]
            },
        select: {
          input_timeout: 0,
          values: [
            { value: 'MOUNTAIN', text: 'Mountain', icon: 'landscape', color: '#bdbdbd' },
            { value: 'COAST', text: 'Coast', icon: 'waves', color: '#26c6da', confirm: 'Switch to coast?', confirm_pin: 4 }
          ]
        },
        fader: readOnly
          ? {
              text: 'Read Only',
              min: 0,
              max: 100,
              value_as: '{value} %',
              ranges: [
                { range: [0, 40], text: 'Low', icon: 'battery_1_bar', color: '#91c900' },
                { range: [41, 75], text: 'Good', icon: 'battery_4_bar', color: '#00c000' },
                { range: [76, 100], text: 'High', icon: 'warning', color: '#f89406' }
              ]
            }
          : {
              text: 'Level',
              icon: 'tune',
              color: '#62a8ea',
              min: 0,
              max: 100,
              value_as: '{value} %',
              live: false,
              input_timeout: 0,
              ranges: [
                { range: [0, 40], text: 'Low', icon: 'battery_1_bar', color: '#91c900' },
                { range: [41, 75], text: 'Good', icon: 'battery_4_bar', color: '#00c000' },
                { range: [76, 100], text: 'High', icon: 'warning', color: '#f89406' }
              ]
            },
        image: readOnly
          ? { overflow: 'hidden' }
          : { overflow: 'hidden', value: 'IMAGE', confirm: 'Send image command?', confirm_pin: 0, input_timeout: 0 },
        iframe: { attributes: { loading: 'lazy', referrerpolicy: 'no-referrer', scrolling: 'auto', overflow: 'auto' } }
      }
      return toYaml(samples[type] || {})
    }

    function toYaml (config) {
      const rows = []
      Object.entries(config).forEach(([key, value]) => {
        if (Array.isArray(value)) {
          rows.push(...stringifyItems(key, value))
        } else if (value && typeof value === 'object') {
          rows.push(...stringifyObject(key, value))
        } else {
          rows.push(`${key}: ${stringifyScalar(value)}`)
        }
      })
      return rows.join('\n')
    }

    $('#node-input-name').val(nodeConfig.name || '')
    $('#node-input-readOnly').prop('checked', nodeConfig.readOnly === undefined
      ? readOnlyDefaultFor(fixedType)
      : (nodeConfig.readOnly === true || nodeConfig.readOnly === 'true'))
    $('#node-input-showMeter').prop('checked', nodeConfig.showMeter === undefined
      ? true
      : (nodeConfig.showMeter === true || nodeConfig.showMeter === 'true'))
    $('#node-input-waitForInput').prop('checked', nodeConfig.waitForInput === undefined
      ? waitForInputDefaultFor(fixedType)
      : (nodeConfig.waitForInput === true || nodeConfig.waitForInput === 'true'))
    $('#node-input-config').val(nodeConfig.config || '')
    updateByType()
    $('#buttonpanel-config-status').text(validateConfig($('#node-input-config').val()) ? 'YAML looks valid' : 'YAML looks invalid')
    $('#node-input-config').toggleClass('buttonpanel-config-invalid', !validateConfig($('#node-input-config').val()))

    $('#node-input-readOnly').on('change', updateByType)
    $('#node-input-showMeter').on('change', updateByType)
    $('#node-input-waitForInput').on('change', updateByType)
    $('#node-input-config').on('input change', function () {
      const ok = validateConfig($(this).val())
      $('#buttonpanel-config-status').text(ok ? 'YAML looks valid' : 'YAML looks invalid')
      $(this).toggleClass('buttonpanel-config-invalid', !ok)
    })

    $('#buttonpanel-example-config').on('click', function (event) {
      event.preventDefault()
      const type = $('#node-input-widgetType').val()
      $('#node-input-config').val(sampleConfig(type)).trigger('input').trigger('change')
    })
  }

  for (const widget of BUTTONPANEL_WIDGETS) {
    RED.nodes.registerType(widget.nodeType, {
      category: 'buttonpanel',
      color: widget.color,
      defaults: buttonpanelDefaults(widget.type),
      inputs: 1,
      outputs: buttonpanelDefaults(widget.type).outputs.value,
      icon: widget.icon,
      align: 'left',
      paletteLabel: widget.label,
      label: function () {
        return this.name || this.label || widget.label
      },
      oneditprepare: function () {
        prepareButtonPanelEditor(widget.type, this)
      }
    })
  }
</script>

<script type="text/html" id="buttonpanel-help-template">
  <p>Compact Dashboard 2.0 widgets for tactile button-style control panels, inspired by <code>sourcesimian/mqtt-panel</code>.</p>
  <p>Incoming messages are reduced to a single incoming value by <code>value_from</code>. Only interactive widgets emit outgoing messages.</p>
  <p>Widgets with both input and output can enable <b>Wait for input</b> to show the waiting state until an input message arrives.</p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt>payload</dt>
    <dd>The default source used by <code>value_from</code>. The widget receives only the resulting incoming value.</dd>
    <dt class="optional">enabled</dt>
    <dd>When set to <code>false</code>, disables widgets that have inputs. Messages without <code>enabled</code> leave widgets enabled.</dd>
    <dt class="optional">ui_update.config</dt>
    <dd>Runtime widget config overrides stored in Dashboard state.</dd>
  </dl>
  <h3>Values and ranges</h3>
  <p><b>Values</b> and <b>Ranges</b> use the YAML list format described in the manual.</p>
  <p>Value entries can include <code>topic</code>, <code>confirm</code>, <code>confirm_pin</code>, and <code>input_timeout</code>. Top-level values for those keys are inherited by individual value entries.</p>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt>payload</dt>
    <dd>The edited, selected, or commanded value. Configured YAML values are emitted as parsed, faders emit numbers, and interactive text emits strings.</dd>
    <dt class="optional">topic</dt>
    <dd>Only emitted when configured at the top level or on the selected value entry.</dd>
    <dt class="optional">pin</dt>
    <dd>Only emitted when <code>confirm_pin</code> is configured and completed.</dd>
  </dl>
</script>

<script type="text/html" data-help-name="ui-buttonpanel-text">
  <p>Text tile. Incoming values update the display; non-read-only text emits user-entered values.</p>
</script>
<script type="text/html" data-help-name="ui-buttonpanel-button">
  <p>Command button tile. Incoming messages can enable or disable it; user taps emit the configured value.</p>
</script>
<script type="text/html" data-help-name="ui-buttonpanel-switch">
  <p>Switch tile. Incoming messages update state. Non-read-only switches cycle through configured Values and emit the selected value; read-only switches are display-only.</p>
</script>
<script type="text/html" data-help-name="ui-buttonpanel-fader">
  <p>Fader tile. Incoming numeric values update the display; non-read-only faders emit numeric values. Disable <b>Show Meter</b> to hide the side meter while keeping the current value and range text.</p>
</script>
<script type="text/html" data-help-name="ui-buttonpanel-select">
  <p>Select tile. Incoming messages update state; user selections emit the selected value.</p>
</script>
<script type="text/html" data-help-name="ui-buttonpanel-image">
  <p>Image tile. Incoming values are used as image URLs. Read-only image widgets are display-only; non-read-only image widgets emit a button-style message when tapped.</p>
  <p>Config key: <code>overflow</code>. For non-read-only images, also <code>value</code>, <code>topic</code>, <code>confirm</code>, <code>confirm_pin</code>, and <code>input_timeout</code>.</p>
</script>
<script type="text/html" data-help-name="ui-buttonpanel-iframe">
  <p>Display-only iframe tile. Incoming values are used as iframe URLs.</p>
  <p>Config key: <code>attributes</code>. Dashboard node Height controls the outer grid frame.</p>
</script>
